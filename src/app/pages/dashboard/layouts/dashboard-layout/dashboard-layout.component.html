<div class="min-h-screen flex bg-gradient-to-br from-gray-50 to-gray-100 container">
<!-- Sidebar -->
<aside [class]="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
  class="fixed lg:sticky lg:translate-x-0 z-30 w-64 h-screen top-0 transition-transform duration-300 ease-in-out bg-white/95 backdrop-blur-sm border-r border-gray-200 shadow-lg">
  <!-- Logo -->
  <div
    class="flex items-center justify-between h-16 px-4 border-b border-gray-200/80 bg-gradient-to-r from-white to-gray-50">
    <span class="text-xl font-bold text-gray-800">TRIN Admin</span>
    <button class="lg:hidden p-2 rounded-md hover:bg-gray-100/80 transition-colors" (click)="toggleSidebar()">
      <img src="assets/icons/close.svg" class="h-5 w-5" />
    </button>
  </div>

  <!-- Navigation Links -->
  <nav class="px-4 py-4 space-y-1.5">
    @for (link of Dashboard_Links; track link.path) {
    <a routerLink="{{link.path}}" routerLinkActive="bg-gradient-to-r from-indigo-50 to-indigo-100 text-indigo-700"
      class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gradient-to-r hover:from-gray-100 hover:to-gray-50 text-gray-900 transition-all duration-200 ease-in-out">
      <img src="assets/icons/{{link.icon}}.svg" class="h-5 w-5 mr-3" />
      {{link.name}}
    </a>
    }
  </nav>
</aside>

<!-- Main Content -->
<div class="flex-1 bg-gradient-to-br from-white/50 to-gray-50/50 backdrop-blur-sm">
  <!-- Top Navigation -->
  <header
    class="h-16 flex items-center justify-between px-4 bg-white/90 backdrop-blur-sm border-b border-gray-200/80 shadow-sm">
    <button class="lg:hidden p-2 rounded-md hover:bg-gray-100/80 transition-colors" (click)="toggleSidebar()">
      <img src="assets/icons/menu.svg" class="h-5 w-5" />
    </button>

    <div class="ml-auto flex items-center space-x-4">
      <button class="p-2 rounded-full hover:bg-gray-100/80 transition-all duration-200">
        <img src="assets/icons/notifications.svg" class="h-5 w-5" />
      </button>

      <button class="p-2 rounded-full hover:bg-gray-100/80 transition-all duration-200">
        <img src="assets/icons/settings.svg" class="h-5 w-5" />
      </button>
    </div>
  </header>

  <!-- Page Content -->
  <main class="p-4">
     <!-- Mobile Banner -->
  <div class="sm:hidden bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200/60 rounded-xl p-4 mb-4 shadow-sm">
    <div class="flex items-center gap-3">
      <div class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-lg bg-amber-100">
        <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <div class="min-w-0 flex-1">
        <h3 class="text-sm font-medium text-amber-900 truncate">Mobile Version Detected</h3>
        <p class="text-xs text-amber-700 mt-1 leading-relaxed line-clamp-2">For the best experience, please visit our desktop version. Some features may be limited on mobile devices.</p>
      </div>
    </div>
  </div>
    <router-outlet></router-outlet>
  </main>
</div>
</div>
