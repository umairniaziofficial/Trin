<div class="min-h-screen bg-gray-50/50 p-4 sm:p-8">
  <!-- Main Container -->
  <div class="w-full max-w-7xl mx-auto space-y-4 sm:space-y-6">
    <!-- Header Section -->
    <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 sm:gap-4">
      <div>
        <h1 class="text-lg sm:text-xl md:text-2xl font-semibold text-gray-900">Products Management</h1>
        <p class="text-xs sm:text-sm text-gray-500 mt-1">Manage your product inventory and listings</p>
      </div>
      <button class="w-full sm:w-auto inline-flex items-center justify-center px-2 sm:px-3 md:px-4 py-2 sm:py-2.5 bg-indigo-600 text-white text-xs sm:text-sm font-medium rounded-lg hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-100 transition-all">
        <svg class="w-3 h-3 sm:w-4 sm:h-4 mr-1.5 sm:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Add Product
      </button>
    </header>

    <!-- Main Content Card -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
      <!-- Search and Filters Bar -->
      <div class="p-2 sm:p-4 md:p-6 border-b border-gray-200">
        <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
          <!-- Search Bar -->
          <div class="relative flex-1">
            <input
              type="text"
              placeholder="Search products..."
              class="w-full pl-8 sm:pl-10 pr-3 sm:pr-4 py-1.5 sm:py-2.5 text-xs sm:text-sm bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
            >
            <svg class="w-4 h-4 sm:w-5 sm:h-5 text-gray-400 absolute left-2 sm:left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </div>
          <!-- Action Buttons -->
          <div class="flex items-center gap-2">
            <button class="flex-1 sm:flex-none inline-flex items-center justify-center px-2 sm:px-3 py-1.5 sm:py-2 text-xs sm:text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-indigo-500/20 transition-all">
              <svg class="w-3 h-3 sm:w-4 sm:h-4 mr-1.5 sm:mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
              </svg>
              Filter
            </button>
            <button class="flex-1 sm:flex-none inline-flex items-center justify-center px-2 sm:px-3 py-1.5 sm:py-2 text-xs sm:text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-indigo-500/20 transition-all">
              <svg class="w-3 h-3 sm:w-4 sm:h-4 mr-1.5 sm:mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
              </svg>
              Export
            </button>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="bg-gray-50">
              <th class="px-2 sm:px-6 py-2 sm:py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Product</th>
              <th class="px-2 sm:px-6 py-2 sm:py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
              <th class="hidden sm:table-cell px-2 sm:px-6 py-2 sm:py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stock</th>
              <th class="hidden md:table-cell px-2 sm:px-6 py-2 sm:py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Price</th>
              <th class="px-2 sm:px-6 py-2 sm:py-4 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200">
            <tr *ngFor="let product of products" class="hover:bg-gray-50/50 transition-colors">
              <td class="px-2 sm:px-6 py-2 sm:py-4">
                <div class="flex items-center">
                  <img class="h-6 w-6 sm:h-8 sm:w-8 rounded-lg object-cover" [src]="product.image || 'assets/placeholder.svg'" [alt]="product.name || 'Product image'">
                  <span class="ml-2 sm:ml-3 text-xs sm:text-sm text-gray-900">{{product.name || 'Unnamed Product'}}</span>
                </div>
              </td>
              <td class="px-2 sm:px-6 py-2 sm:py-4 text-xs sm:text-sm text-gray-500">{{product.category || 'Uncategorized'}}</td>
              <td class="hidden sm:table-cell px-2 sm:px-6 py-2 sm:py-4">
                <span class="inline-flex items-center px-1.5 sm:px-2.5 py-0.5 rounded-full text-xs font-medium"
                      [class.bg-green-100]="(product.stock || 0) > 10"
                      [class.text-green-800]="(product.stock || 0) > 10"
                      [class.bg-red-100]="(product.stock || 0) <= 10"
                      [class.text-red-800]="(product.stock || 0) <= 10">
                  {{product.stock || 0}} units
                </span>
              </td>
              <td class="hidden md:table-cell px-2 sm:px-6 py-2 sm:py-4 text-xs sm:text-sm font-medium text-gray-900">${{product.price || 0}}</td>
              <td class="px-2 sm:px-6 py-2 sm:py-4 text-right">
                <div class="flex justify-end gap-1 sm:gap-2">
                  <button class="inline-flex items-center justify-center px-1.5 sm:px-2 py-1 text-xs sm:text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-indigo-500/20 transition-all">
                    <svg class="w-3 h-3 sm:w-4 sm:h-4 mr-1 sm:mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                    <span class="hidden sm:inline">Edit</span>
                  </button>
                  <button class="inline-flex items-center justify-center px-1.5 sm:px-2 py-1 text-xs sm:text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-indigo-500/20 transition-all">
                    <svg class="w-3 h-3 sm:w-4 sm:h-4 mr-1 sm:mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    <span class="hidden sm:inline">Delete</span>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="px-2 sm:px-6 py-2 sm:py-4 border-t border-gray-200">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 sm:gap-3">
          <p class="text-xs sm:text-sm text-gray-500">Showing 1 to 10 of 50 entries</p>
          <div class="flex gap-2">
            <button class="flex-1 sm:flex-none inline-flex items-center justify-center px-2 sm:px-3 py-1.5 sm:py-2 text-xs sm:text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-2 focus:ring-indigo-500/20 disabled:opacity-50 disabled:hover:bg-white transition-all">
              Previous
            </button>
            <button class="flex-1 sm:flex-none inline-flex items-center justify-center px-2 sm:px-3 py-1.5 sm:py-2 text-xs sm:text-sm font-medium text-white bg-indigo-600 border border-transparent rounded-lg hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-500/20 transition-all">
              Next
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
