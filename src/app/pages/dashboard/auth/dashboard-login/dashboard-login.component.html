<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-blue-50 to-violet-50 p-4">
  <div class="max-w-5xl w-full flex rounded-2xl shadow-2xl bg-white overflow-hidden">
    <!-- Image Section -->
    <div class="hidden lg:block w-1/2 relative">
      <img
        src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2069&auto=format&fit=crop"
        alt="Dashboard Login"
        class="absolute inset-0 w-full h-full object-cover"
      >
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/40 to-transparent flex items-end p-8">
        <div class="text-white">
          <h2 class="text-3xl font-bold mb-2">Welcome to Trin Admin</h2>
          <p class="text-sm opacity-90">Manage your store with our powerful dashboard</p>
        </div>
      </div>
    </div>

    <!-- Form Section -->
    <div class="w-full lg:w-1/2 p-8 sm:p-12">
      <div class="text-center mb-8 sm:mb-10">
        <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-2">Welcome Back</h1>
        <p class="text-sm sm:text-base text-gray-600">Enter your credentials to access dashboard</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Error Alert -->
        <div *ngIf="error" class="p-4 mb-4 text-sm text-red-800 rounded-lg bg-red-50" role="alert">
          {{ error }}
        </div>

        <div class="space-y-4">
          <div class="relative">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="name@company.com"
              class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition duration-200"
              [class.border-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            >
          </div>

          <div class="relative">
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input
              type="password"
              id="password"
              formControlName="password"
              placeholder="••••••••"
              class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition duration-200"
              [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            >
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input
              type="checkbox"
              id="remember-me"
              formControlName="rememberMe"
              class="w-4 h-4 rounded border-gray-300 text-black focus:ring-black"
            >
            <label for="remember-me" class="ml-2 text-sm text-gray-600">Stay signed in</label>
          </div>

          <button
            type="button"
            onclick="alert('Please contact the system administrator at admin@trin.com to reset your password.')"
            class="text-sm text-black hover:text-gray-700 font-medium transition duration-200">
            Forgot password?
          </button>
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
          class="w-full py-3 px-4 bg-black hover:bg-gray-900 text-white font-medium rounded-lg shadow-lg transition duration-200 transform hover:translate-y-[-1px] active:translate-y-[1px] flex items-center justify-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span>Sign in to Dashboard</span>
          <svg *ngIf="!isLoading" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
          <svg *ngIf="isLoading" class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>

        <div class="text-center">
          <p class="text-sm text-gray-600">
            Protected by reCAPTCHA and subject to the
            <a routerLink="/privacy-policy" class="text-black hover:text-gray-700 font-medium underline decoration-1 underline-offset-2 transition duration-200">Privacy Policy</a> and
            <a routerLink="/terms-of-service" class="text-black hover:text-gray-700 font-medium underline decoration-1 underline-offset-2 transition duration-200">Terms of Service</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
