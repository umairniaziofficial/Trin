<main role="main" class="w-full min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-7xl mx-auto flex shadow-none md:shadow-2xl rounded-2xl overflow-hidden">
    <!-- Left Section with Image -->
    <div class="hidden lg:block w-1/2 relative">
      <img
        src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?ixlib=rb-4.0.3"
        alt="Athletes training"
        class="w-full h-full object-cover"
      />
      <div class="absolute inset-0 bg-gradient-to-r from-black/40 to-black/20 flex flex-col justify-center px-12">
        <h2 class="text-4xl font-bold text-white mb-4">Welcome Back</h2>
        <p class="text-white/90 text-lg">Sign in to continue your journey</p>
      </div>
    </div>

    <!-- Right Section with Form -->
    <div class="w-full lg:w-1/2 bg-white p-6 sm:p-8 md:p-12">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Sign In</h1>
        <p class="text-gray-600">Welcome back! Please enter your details</p>
      </div>

      <form class="space-y-6" (ngSubmit)="onSubmit()">
        <!-- Error Message -->
        <div *ngIf="error" class="p-3 text-sm text-red-500 bg-red-50 rounded-lg">
          {{ error }}
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">
            Email Address
          </label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="formData.email"
            required
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-black focus:border-transparent transition-all duration-200 outline-none"
            placeholder="Enter your email"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">
            Password
          </label>
          <div class="space-y-2">
            <input
              type="password"
              id="password"
              name="password"
              [(ngModel)]="formData.password"
              required
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-black focus:border-transparent transition-all duration-200 outline-none"
              placeholder="Enter your password"
            />
            <div class="flex justify-end">
              <a routerLink="/forgot-password" class="text-sm text-black hover:text-gray-700 font-medium">
                Forgot password?
              </a>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-3 bg-black text-white rounded-xl hover:bg-gray-800 transition-all duration-200 disabled:opacity-50"
        >
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>

        <!-- Sign Up Link -->
        <p class="text-center text-gray-600">
          Don't have an account?
          <a routerLink="/signup" class="font-medium text-black hover:text-gray-700 hover:underline">
            Sign up
          </a>
        </p>
      </form>
    </div>
  </div>
</main>
