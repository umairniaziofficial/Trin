<div class="notifications-container bg-white p-6 rounded-xl shadow-sm">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Notifications</h1>
      <p class="text-gray-500 mt-1">Stay updated with your latest activities</p>
    </div>
    <button
      (click)="markAllAsRead()"
      class="inline-flex items-center px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
      Mark all as read
    </button>
  </div>

  <!-- Notifications List -->
  <div class="space-y-6">
    <div *ngFor="let group of notificationGroups" class="space-y-4">
      <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wider">
        {{ group.title }}
      </h2>

      <div class="space-y-3">
        <div *ngFor="let notification of group.notifications"
          class="flex gap-4 p-4 rounded-lg transition-all"
          [class.bg-indigo-50]="notification.isUnread"
          [class.hover:bg-gray-50]="!notification.isUnread">

          <div [class]="notification.iconBg + ' p-2 rounded-lg'">
            <img [src]="'assets/icons/' + notification.icon + '.svg'"
                 class="w-5 h-5"
                 alt="Notification icon"/>
          </div>

          <div class="flex-1 min-w-0">
            <div class="flex justify-between">
              <p class="text-sm font-medium text-gray-900">
                {{ notification.title }}
              </p>
              <span class="text-xs text-gray-500">{{ notification.time }}</span>
            </div>
            <p class="mt-1 text-sm text-gray-500 line-clamp-2">
              {{ notification.description }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
